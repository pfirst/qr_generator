<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="img/favicon.png">
<title>QR Generator Pro</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+Thai:wght@300;400;600;700&display=swap');
  /* ── DARK (default) – deep navy like Zentra */
  :root {
    --bg:#0d1117;--surface:#161b27;--surface2:#1e2535;--border:#2a3348;
    --accent:#3b82f6;--accent2:#818cf8;--accentglow:rgba(59,130,246,0.18);
    --text:#e8edf5;--text2:#7a8ba8;--text3:#3d4f6e;
    --dot:#3b82f6;
    --radius:14px;--header-bg:#0d1117;
  }
  /* ── LIGHT – clean white/blue like Image 1 */
  .light {
    --bg:#f0f4fa;--surface:#ffffff;--surface2:#e8edf7;--border:#d1dbed;
    --accent:#1d4ed8;--accent2:#4f46e5;--accentglow:rgba(29,78,216,0.10);
    --text:#0f172a;--text2:#475569;--text3:#94a3b8;
    --dot:#1d4ed8;
    --radius:14px;--header-bg:#ffffff;
  }
  html{height:100%;overflow:hidden;}  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans Thai',sans-serif;min-height:100vh;transition:background .3s,color .3s,border-color .3s;overflow:hidden;height:100vh;}
  .header{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;border-bottom:1px solid var(--border);background:var(--header-bg);position:sticky;top:0;z-index:100;box-shadow:0 1px 0 var(--border);}
  .logo{font-family:'Space Mono',monospace;font-size:17px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .logo-subtext{font-family:'Space Mono',monospace;font-size:11px;font-weight:400;letter-spacing:0.03em;color:var(--text3);background:none;-webkit-background-clip:none;-webkit-text-fill-color:unset;margin-left:8px;}
  .theme-btn{width:38px;height:38px;border-radius:50%;border:1px solid var(--border);background:var(--surface2);color:var(--text);cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;transition:all .2s;}
  .theme-btn:hover{border-color:var(--accent);color:#fff;}
  .main{display:grid;grid-template-columns:360px 1fr;gap:16px;padding:16px 24px;max-width:1400px;margin:0 auto;height:calc(100vh - 52px);overflow:hidden;}
  @media(max-width:860px){
    .header{padding:10px 14px;background:var(--header-bg);}
    .main{grid-template-columns:1fr;padding:0;gap:0;display:flex;flex-direction:column;height:auto;overflow:visible;} html,body{height:auto;overflow:visible;}
    .left-col{overflow-y:visible;max-height:none;padding:124px 11px 4px;order:2;margin-top:calc(var(--header-h,52px) + 30svh + 1px);}
    .right-col{order:1;position:fixed;top:var(--header-h,52px);left:0;right:0;z-index:90;background:var(--bg);height:30svh;min-height:200px;max-height:390px;display:flex;flex-direction:column;overflow:hidden;border-bottom:1px solid var(--border);padding:10px 10px 0;}
    .preview-panel{position:static;height:100%;display:flex;flex-direction:column;overflow:hidden;}
    .qr-wrap{padding:8px;border-radius:0;border-left:none;border-right:none;flex:1;min-height:0;overflow:hidden;width:100%;}
    #qrCanvas{display:block;}
    .dl-panel-full{display:none;}
    .dl-panel-mobile{display:flex !important;}
    .tab{padding:7px 12px;font-size:12px;}
    .ecc-btn{padding:10px 3px;font-size:11px;}
    .shape-btn{font-size:17px;}
    input[type=range]::-webkit-slider-thumb{width:22px;height:22px;}
    .panel.mb{margin-bottom:10px;}
    .section{padding:12px 14px;}
    .scan-panel-mobile{display:none;}
  }
  .mobile-only{display:none;}
  @media(max-width:860px){
    .mobile-only{display:block;}
  }
  .panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);transition:background .3s,border-color .3s;}
  .panel-title{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);padding:12px 16px 8px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:7px;}
  .panel-title span{font-size:13px;}
  .section{padding:14px 16px;border-bottom:1px solid var(--border);}
  .section:last-child{border-bottom:none;}
  .label{font-size:11px;color:var(--text2);margin-bottom:7px;display:block;font-weight:600;letter-spacing:.03em;}
  .tabs{display:flex;gap:4px;flex-wrap:wrap;}
  .tab{padding:5px 10px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:11px;cursor:pointer;transition:all .2s;font-family:inherit;}
  .tab.active{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 2px 8px var(--accentglow);}
  .tab:hover:not(.active){border-color:var(--accent);color:var(--accent);}
  textarea,input[type=text],input[type=url],input[type=email],input[type=tel],select{
    width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;
    color:var(--text);padding:9px 11px;font-size:12px;font-family:inherit;outline:none;transition:border-color .2s;
  }
  textarea:focus,input[type=text]:focus,input[type=url]:focus,input[type=email]:focus,input[type=tel]:focus,select:focus{border-color:var(--accent);}
  textarea{min-height:72px;resize:vertical;}
  select option{background:var(--surface);}
  .range-row{display:flex;align-items:center;gap:10px;}
  input[type=range]{-webkit-appearance:none;flex:1;height:4px;background:var(--border);border-radius:2px;outline:none;}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;border-radius:50%;background:var(--accent);cursor:pointer;}
  .range-val{font-family:'Space Mono',monospace;font-size:11px;color:var(--accent);min-width:34px;text-align:right;}
  .color-presets{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:7px;}
  .color-dot{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .15s,border-color .15s;flex-shrink:0;}
  .color-dot:hover{transform:scale(1.18);}
  .color-dot.active{border-color:var(--dot) !important;}
  .color-row{display:flex;gap:7px;align-items:center;}
  input[type=color]{width:34px;height:34px;border-radius:7px;border:1px solid var(--border);background:none;cursor:pointer;padding:2px;}
  .color-hex{flex:1;}
  .shape-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;}
  .shape-btn{aspect-ratio:1;border-radius:7px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;font-size:15px;color:var(--text2);}
  .shape-btn.active{border-color:var(--accent);background:var(--accentglow);color:var(--text);}
  .shape-btn:hover:not(.active){border-color:var(--accent);color:var(--accent);}
  .ecc-row{display:flex;gap:5px;}
  .ecc-btn{flex:1;padding:7px 3px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:10px;font-weight:700;cursor:pointer;transition:all .2s;font-family:inherit;text-align:center;line-height:1.4;}
  .ecc-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 2px 10px var(--accentglow);}
  .logo-upload{border:2px dashed var(--border);border-radius:8px;padding:14px 12px;text-align:center;cursor:pointer;transition:border-color .2s;display:block;width:100%;box-sizing:border-box;overflow:hidden;}
  .logo-upload:hover{border-color:var(--accent);}
  .logo-upload input{display:none;}
  .logo-preview{max-width:56px;max-height:56px;border-radius:6px;margin:7px auto;display:block;}
  .right-col{display:flex;flex-direction:column;height:100%;overflow:hidden;}
  .preview-panel{display:flex;flex-direction:column;height:100%;gap:12px;overflow:hidden;}
  .qr-wrap{display:flex;align-items:center;justify-content:center;padding:20px;background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);flex:1;min-height:0;overflow:hidden;transition:background .3s,border-color .3s;}
  #qrCanvas{border-radius:4px;max-width:100%;max-height:100%;object-fit:contain;display:block;}
  .no-qr{text-align:center;color:var(--text3);font-size:13px;}
  .no-qr-icon{font-size:44px;margin-bottom:10px;}
  .dl-row{display:flex;gap:7px;flex-wrap:wrap;padding:14px 16px;}
  .dl-btn{flex:1;min-width:70px;padding:9px 7px;border-radius:7px;border:none;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;font-family:inherit;letter-spacing:.05em;}
  .dl-png{background:var(--accent);color:#fff;box-shadow:0 2px 12px var(--accentglow);}
  .dl-svg{background:transparent;border:1px solid var(--accent);color:var(--accent);}
  .dl-pdf{background:transparent;border:1px solid var(--accent2);color:var(--accent2);}
  .dl-btn:hover{filter:brightness(1.15);transform:translateY(-1px);}
  .dl-btn:active{transform:translateY(0);}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
  .form-grid .full{grid-column:1/-1;}
  .left-col{overflow-y:scroll;height:100%;padding-right:8px;scrollbar-gutter:stable;}
  .left-col::-webkit-scrollbar{width:3px;}
  .left-col::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
  .mb{margin-bottom:14px;}
  .toast{position:fixed;bottom:20px;right:20px;background:var(--accent);color:#fff;padding:10px 18px;border-radius:8px;font-size:12px;font-weight:600;opacity:0;transform:translateY(10px);transition:all .3s;pointer-events:none;z-index:999;}
  .toast.show{opacity:1;transform:translateY(0);}
  .export-size-wrap{padding:10px 16px 14px;border-top:1px solid var(--border);}
  .export-size-presets{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;}
  .size-preset{padding:4px 9px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:11px;font-family:'Space Mono',monospace;cursor:pointer;transition:all .2s;}
  .grad-preset-btn{padding:5px 10px;border-radius:20px;border:2px solid transparent;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;font-family:inherit;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,0.4);letter-spacing:.03em;}
  .grad-preset-btn:hover{transform:scale(1.08);filter:brightness(1.1);}
  .grad-preset-btn.active{border-color:#fff;box-shadow:0 0 0 2px var(--accent);}
  .size-preset.active{background:var(--accent);border-color:var(--accent);color:#fff;}
  .size-preset:hover:not(.active){border-color:var(--accent);color:var(--accent);}
  .export-custom-row{display:flex;align-items:center;gap:7px;margin-top:6px;}
  .export-custom-row input[type=number]{width:80px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);padding:6px 9px;font-size:12px;font-family:'Space Mono',monospace;outline:none;transition:border-color .2s;-moz-appearance:textfield;}
  .export-custom-row input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
  .export-custom-row input[type=number]:focus{border-color:var(--accent);}
  .tab:active,.ecc-btn:active,.shape-btn:active,.dl-btn:active,.size-preset:active,.theme-btn:active{opacity:.85;}
  .export-size-badge{font-family:'Space Mono',monospace;font-size:10px;color:var(--text3);margin-left:2px;}
</style>
</head>
<body>
<div class="header">
  <div class="logo">
  <svg style="display:inline;vertical-align:middle;margin-right:6px" width="20" height="20" fill="none" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="var(--accent)" />
      <stop offset="100%" stop-color="var(--accent2)" />
    </linearGradient>
  </defs>
    <path stroke="url(#logoGradient)" stroke-width="2" d="M4 4h6v6H4V4Zm10 10h6v6h-6v-6Zm0-10h6v6h-6V4Zm-4 10h.01v.01H10V14Zm0 4h.01v.01H10V18Zm-3 2h.01v.01H7V20Zm0-4h.01v.01H7V16Zm-3 2h.01v.01H4V18Zm0-4h.01v.01H4V14Z"/>
    <path stroke="url(#logoGradient)" stroke-width="2" d="M7 7h.01v.01H7V7Zm10 10h.01v.01H17V17Z"/>
  </svg>QR GENERATOR PRO <span class="logo-subtext">Powered by Puggy</span>
</div>
  <button class="theme-btn" id="themeBtn">🌙</button>
</div>
<div class="toast" id="toast"></div>

<div class="main">
  <div class="left-col">
    <div class="panel mb">
      <div class="panel-title"><span>📋</span> ประเภทข้อมูล</div>
      <div class="section">
        <div class="tabs" id="typeTabs">
          <button class="tab active" data-type="url">URL</button>
          <button class="tab" data-type="text">ข้อความ</button>
          <button class="tab" data-type="promptpay">PromptPay</button>
          <button class="tab" data-type="wifi">Wi-Fi</button>
          <button class="tab" data-type="vcard">vCard</button>
          <button class="tab" data-type="email">Email</button>
          <button class="tab" data-type="phone">โทร</button>
          <button class="tab" data-type="sms">SMS</button>
          <button class="tab" data-type="location">พิกัด</button>
        </div>
      </div>
      <div class="section" id="dataFields"></div>
    </div>

    <div class="panel mb">
      <div class="panel-title"><span>🎨</span> รูปทรง QR</div>
      <div class="section">
        <label class="label">Body — จุดข้อมูล</label>
        <div class="shape-grid" id="bodyShapes"></div>
      </div>
      <div class="section">
        <label class="label">Eye Frame — กรอบมุม</label>
        <div class="shape-grid" id="eyeShapes"></div>
      </div>
      <div class="section">
        <label class="label">Eye Ball — จุดมุม</label>
        <div class="shape-grid" id="eyeballShapes"></div>
      </div>
    </div>

    <div class="panel mb">
      <div class="panel-title"><span>🖌</span> สี</div>
      <div class="section">
        <label class="label">สี QR (Foreground)</label>
        <div class="color-presets" id="fgPresets"></div>
        <div class="color-row">
          <input type="color" id="fgPicker" value="#000000">
          <input type="text" class="color-hex" id="fgHex" value="#000000" maxlength="7" placeholder="#000000">
        </div>
      </div>
      <div class="section">
        <label class="label">สีพื้นหลัง (Background)</label>
        <div class="color-presets" id="bgPresets"></div>
        <div class="color-row">
          <input type="color" id="bgPicker" value="#ffffff">
          <input type="text" class="color-hex" id="bgHex" value="#ffffff" maxlength="7" placeholder="#ffffff">
        </div>
      </div>
      <div class="section">
        <label class="label">สี Eye</label>
        <div class="color-row">
          <input type="color" id="eyePicker" value="#000000">
          <input type="text" class="color-hex" id="eyeHex" value="" maxlength="7" placeholder="ใช้สีเดียวกับ QR">
          <button class="tab" id="clearEyeBtn"><svg width="10" height="10" viewBox="0 0 10 10" fill="none">
          <path d="M1.5 1.5L8.5 8.5M8.5 1.5L1.5 8.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"></path>
        </svg></button>
        </div>
      </div>
      <div class="section">
        <label class="label">Gradient สี QR</label>
        <div class="tabs" id="gradTypeTabs" style="margin-bottom:10px">
          <button class="tab active" data-grad="none">ไม่มี</button>
          <button class="tab" data-grad="linear">Linear ↘</button>
          <button class="tab" data-grad="radial">Radial ◎</button>
          <button class="tab" data-grad="diagonal">Diagonal ↗</button>
        </div>
        <div id="gradOptions" style="display:none">
          <label class="label">สีเริ่มต้น Gradient</label>
          <div class="color-row" style="margin-bottom:10px">
            <input type="color" id="gradColor1" value="#7c6af7">
            <input type="text" class="color-hex" id="gradHex1" value="#7c6af7" maxlength="7" placeholder="#7c6af7">
          </div>
          <label class="label">สีปลาย Gradient</label>
          <div class="color-row">
            <input type="color" id="gradColor2" value="#f76ac8">
            <input type="text" class="color-hex" id="gradHex2" value="#f76ac8" maxlength="7" placeholder="#f76ac8">
          </div>
          <div style="margin-top:10px;display:flex;gap:6px;flex-wrap:wrap" id="gradPresets">
            <button class="grad-preset-btn" data-g1="#7c6af7" data-g2="#f76ac8" style="background:linear-gradient(135deg,#7c6af7,#f76ac8)">Purple</button>
            <button class="grad-preset-btn" data-g1="#f5a623" data-g2="#e94560" style="background:linear-gradient(135deg,#f5a623,#e94560)">Sunset</button>
            <button class="grad-preset-btn" data-g1="#00c9a7" data-g2="#005c97" style="background:linear-gradient(135deg,#00c9a7,#005c97)">Ocean</button>
            <button class="grad-preset-btn" data-g1="#f7971e" data-g2="#ffd200" style="background:linear-gradient(135deg,#f7971e,#ffd200)">Gold</button>
            <button class="grad-preset-btn" data-g1="#000000" data-g2="#434343" style="background:linear-gradient(135deg,#000000,#434343)">Dark</button>
            <button class="grad-preset-btn" data-g1="#2980b9" data-g2="#6dd5fa" style="background:linear-gradient(135deg,#2980b9,#6dd5fa)">Sky</button>
            <button class="grad-preset-btn" data-g1="#e94560" data-g2="#f5a623" style="background:linear-gradient(135deg,#e94560,#f5a623)">Fire</button>
            <button class="grad-preset-btn" data-g1="#27ae60" data-g2="#2ecc71" style="background:linear-gradient(135deg,#27ae60,#2ecc71)">Forest</button>
            <button class="grad-preset-btn" data-g1="#fc466b" data-g2="#3f5efb" style="background:linear-gradient(135deg,#fc466b,#3f5efb)">Neon</button>
            <button class="grad-preset-btn" data-g1="#f953c6" data-g2="#b91d73" style="background:linear-gradient(135deg,#f953c6,#b91d73)">Pink</button>
            <button class="grad-preset-btn" data-g1="#11998e" data-g2="#38ef7d" style="background:linear-gradient(135deg,#11998e,#38ef7d)">Mint</button>
            <button class="grad-preset-btn" data-g1="#c94b4b" data-g2="#4b134f" style="background:linear-gradient(135deg,#c94b4b,#4b134f)">Wine</button>
            <button class="grad-preset-btn" data-g1="#4facfe" data-g2="#00f2fe" style="background:linear-gradient(135deg,#4facfe,#00f2fe)">Aqua</button>
            <button class="grad-preset-btn" data-g1="#a18cd1" data-g2="#fbc2eb" style="background:linear-gradient(135deg,#a18cd1,#fbc2eb)">Lavender</button>
            <button class="grad-preset-btn" data-g1="#f77062" data-g2="#fe5196" style="background:linear-gradient(135deg,#f77062,#fe5196)">Coral</button>
            <button class="grad-preset-btn" data-g1="#1a1a2e" data-g2="#16213e" style="background:linear-gradient(135deg,#1a1a2e,#16213e)">Midnight</button>
          </div>
        </div>
      </div>
    </div>

    <div class="panel mb">
      <div class="panel-title"><span>⚙️</span> ขนาด & ความหนาแน่น</div>
      <div class="section">
        <label class="label">ความหนาแน่น / Error Correction</label>
        <div class="ecc-row">
          <button class="ecc-btn active" data-ecc="L">⚡<br>แสกนไว<br><span style="font-size:9px">(7%)</span></button>
          <button class="ecc-btn" data-ecc="M">✅<br>มาตรฐาน<br><span style="font-size:9px">(15%)</span></button>
          <button class="ecc-btn" data-ecc="Q">🖼<br>มีโลโก้<br><span style="font-size:9px">(25%)</span></button>
          <button class="ecc-btn" data-ecc="H">🔒<br>หนาแน่นสุด<br><span style="font-size:9px">(30%)</span></button>
        </div>
      </div>
      <div class="section">
        <label class="label">ขนาด Output (px)</label>
        <div class="range-row">
          <input type="range" id="sizeR" min="100" max="1000" value="320" step="10">
          <span class="range-val" id="sizeV">320</span>
        </div>
      </div>
      <div class="section">
        <label class="label">Margin ขอบขาวรอบ QR</label>
        <div class="range-row">
          <input type="range" id="marginR" min="0" max="10" value="2" step="1">
          <span class="range-val" id="marginV">2</span>
        </div>
      </div>
    </div>

    <div class="panel mb">
      <div class="panel-title"><span>🖼</span> โลโก้</div>
      <div class="section" style="border-bottom:none">
        <label class="logo-upload" id="logoLabel">
          <input type="file" id="logoInput" accept="image/*">
          <div id="logoContent">
            <div style="font-size:22px">📤</div>
            <div style="font-size:11px;color:var(--text2);margin-top:4px">คลิกเพื่ออัปโหลดโลโก้</div>
          </div>
        </label>
        <button class="tab" id="clearLogoBtn" style="margin-top:8px;width:100%;text-align:center;"><svg width="10" height="10" viewBox="0 0 10 10" fill="none">
          <path d="M1.5 1.5L8.5 8.5M8.5 1.5L1.5 8.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"></path>
        </svg></button>

  for(var r=0;r<blocks.length;r++){
    var dc=blocks[r].data,ec=blocks[r].total-dc;
    maxDC=Math.max(maxDC,dc);maxEC=Math.max(maxEC,ec);
    dcdata[r]=new Array(dc);for(var i=0;i<dc;i++)dcdata[r][i]=0xff&buf.buf[i+off];off+=dc;
    var rsp=getECPoly(ec),rawp=new Poly(dcdata[r],rsp.len()-1),modp=rawp.mod(rsp);
    ecdata[r]=new Array(rsp.len()-1);
    for(var i=0;i<ecdata[r].length;i++){var mi=i+modp.len()-ecdata[r].length;ecdata[r][i]=mi>=0?modp.get(mi):0;}
  }
  var data=new Array(blocks.reduce((s,b)=>s+b.total,0)),idx=0;
  for(var i=0;i<maxDC;i++)for(var r=0;r<blocks.length;r++)if(i<dcdata[r].length)data[idx++]=dcdata[r][i];
  for(var i=0;i<maxEC;i++)for(var r=0;r<blocks.length;r++)if(i<ecdata[r].length)data[idx++]=ecdata[r][i];
  // place
  var inc=-1,row=this.mc-1,bit=7,byte=0;
  for(var col=this.mc-1;col>0;col-=2){
    if(col==6)col--;
    while(true){
      for(var c=0;c<2;c++){
        if(this.m[row][col-c]===null){
          var dark=byte<data.length?((data[byte]>>>bit)&1)==1:false;
          if(getMaskFn(mask,row,col-c))dark=!dark;
          this.m[row][col-c]=dark;
          bit--;if(bit==-1){byte++;bit=7;}
        }
      }
      row+=inc;
      if(row<0||this.mc<=row){row-=inc;inc=-inc;break;}
    }
  }
},
isDark:function(r,c){return this.m[r][c]===true;},
getModuleCount:function(){return this.mc;}
};

return{
  create:function(text,ecl){
    var eclMap={L:1,M:0,Q:3,H:2};
    var q=new QR(0,eclMap[ecl]||1);
    q.add(unescape(encodeURIComponent(text)));
    q.make();
    return q;
  }
};

// ===== PROMPTPAY ENGINE =====
function crc16(str){
  var crc=0xFFFF;
  for(var i=0;i<str.length;i++){
    crc^=str.charCodeAt(i)<<8;
    for(var j=0;j<8;j++){if(crc&0x8000)crc=(crc<<1)^0x1021;else crc<<=1;crc&=0xFFFF;}
  }
  return crc.toString(16).toUpperCase().padStart(4,'0');
}
function tlv(tag,val){return tag+val.length.toString().padStart(2,'0')+val;}
function buildPromptPayPayload(target,amount){
  if(!target)return '';
  var proxy=target.replace(/[-\s]/g,'');
  // Phone: 10 digits starting 0 → convert to 0066XXXXXXXXX
  if(/^0[0-9]{9}$/.test(proxy)) proxy='0066'+proxy.slice(1);
  // else: national ID 13 digits or tax ID — use as-is
  var hasAmt=amount&&parseFloat(amount)>0;
  var merchantInfo=tlv('00','A000000677010111')+tlv('01',proxy);
  var payload=
    tlv('00','01')+
    tlv('01',hasAmt?'12':'11')+
    tlv('29',merchantInfo)+
    tlv('53','764');
  if(hasAmt)payload+=tlv('54',parseFloat(amount).toFixed(2));
  payload+=tlv('58','TH');
  payload+='6304';
  payload+=crc16(payload);
  return payload;
}

// ===== DRAW HELPERS =====
function rr(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}
function drawStar(ctx,cx,cy,R,r2,n){
  ctx.beginPath();
  for(var i=0;i<n*2;i++){var ri=i%2===0?R:r2;var a=i*Math.PI/n-Math.PI/2;i===0?ctx.moveTo(cx+ri*Math.cos(a),cy+ri*Math.sin(a)):ctx.lineTo(cx+ri*Math.cos(a),cy+ri*Math.sin(a));}
  ctx.closePath();
}
function drawHex(ctx,cx,cy,r){
  ctx.beginPath();
  for(var i=0;i<6;i++){var a=i*Math.PI/3-Math.PI/6;i===0?ctx.moveTo(cx+r*Math.cos(a),cy+r*Math.sin(a)):ctx.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a));}
  ctx.closePath();
}

function drawModule(ctx,x,y,s,shape,color){
  ctx.fillStyle=color;
  // Non-square shapes must be slightly smaller to avoid bleeding into adjacent modules
  // Full-size shapes corrupt timing/alignment patterns → QR becomes unscannable
  var g=shape==='square'?0:s*0.10; // 10% gap for non-square
  var xs=x+g/2,ys=y+g/2,ss=s-g;
  if(shape==='square'){ctx.fillRect(x,y,s,s);}
  else if(shape==='rounded'){ctx.beginPath();rr(ctx,xs,ys,ss,ss,ss*0.32);ctx.fill();}
  else if(shape==='circle'||shape==='dot'){ctx.beginPath();ctx.arc(xs+ss/2,ys+ss/2,ss/2,0,Math.PI*2);ctx.fill();}
  else if(shape==='diamond'){ctx.beginPath();ctx.moveTo(xs+ss/2,ys);ctx.lineTo(xs+ss,ys+ss/2);ctx.lineTo(xs+ss/2,ys+ss);ctx.lineTo(xs,ys+ss/2);ctx.closePath();ctx.fill();}
  else if(shape==='star'){ctx.beginPath();drawStar(ctx,xs+ss/2,ys+ss/2,ss/2,ss/4.5,5);ctx.fill();}
  else if(shape==='triangle'){ctx.beginPath();ctx.moveTo(xs+ss/2,ys);ctx.lineTo(xs+ss,ys+ss);ctx.lineTo(xs,ys+ss);ctx.closePath();ctx.fill();}
  else if(shape==='cross'){var t=ss*0.28;ctx.fillRect(xs+t,ys,ss-2*t,ss);ctx.fillRect(xs,ys+t,ss,ss-2*t);}
  else if(shape==='leaf'){ctx.beginPath();ctx.moveTo(xs,ys+ss);ctx.quadraticCurveTo(xs,ys,xs+ss,ys);ctx.quadraticCurveTo(xs+ss,ys+ss,xs,ys+ss);ctx.fill();}
  else if(shape==='hexagon'){ctx.beginPath();drawHex(ctx,xs+ss/2,ys+ss/2,ss/2);ctx.fill();}
  else{ctx.fillRect(x,y,s,s);}
}

// addShapePath: adds shape to current path (no fill) — used for gradient batch fill
function addShapePath(ctx,x,y,s,shape){
  if(shape==='rounded'){rr(ctx,x,y,s,s,s*0.32);}
  else if(shape==='circle'||shape==='dot'){ctx.moveTo(x+s/2+s*0.46,y+s/2);ctx.arc(x+s/2,y+s/2,s*0.46,0,Math.PI*2);}
  else if(shape==='diamond'){ctx.moveTo(x+s/2,y);ctx.lineTo(x+s,y+s/2);ctx.lineTo(x+s/2,y+s);ctx.lineTo(x,y+s/2);ctx.closePath();}
  else if(shape==='star'){drawStar(ctx,x+s/2,y+s/2,s/2,s/4.5,5);}
  else if(shape==='triangle'){ctx.moveTo(x+s/2,y+s*0.05);ctx.lineTo(x+s*0.95,y+s*0.95);ctx.lineTo(x+s*0.05,y+s*0.95);ctx.closePath();}
  else if(shape==='cross'){var t=s*0.28;ctx.rect(x+t,y,s-2*t,s);ctx.rect(x,y+t,s,s-2*t);}
  else if(shape==='leaf'){ctx.moveTo(x,y+s);ctx.quadraticCurveTo(x,y,x+s,y);ctx.quadraticCurveTo(x+s,y+s,x,y+s);}
  else if(shape==='hexagon'){drawHex(ctx,x+s/2,y+s/2,s/2);}
  else{ctx.rect(x,y,s,s);}// square and fallback
}

function drawEyeAt(ctx,cx,cy,ms,fill){
  var ec=fill||(S.useEyeColor?S.eyeColor:S.fgColor);
  var os=ms*7,ins=ms*5,bw=ms;
  var x=cx-os/2,y=cy-os/2;
  var isOffscreen=(fill==='#000000'); // offscreen mode: use evenodd, no bg refill

  // --- Draw outer frame as a donut (outer path - inner path, evenodd) ---
  ctx.fillStyle=ec;
  ctx.beginPath();
  // outer shape
  if(S.eyeShape==='circle'){
    ctx.arc(cx,cy,os/2,0,Math.PI*2,false);
    // inner hole (clockwise = subtract with evenodd)
    ctx.arc(cx,cy,os/2-bw,0,Math.PI*2,true);
  }else if(S.eyeShape==='rounded'){
    rr(ctx,x,y,os,os,os*0.22);
    // inner hole: reverse winding
    rrReverse(ctx,x+bw,y+bw,ins,ins,ins*0.18);
  }else if(S.eyeShape==='leaf'){
    ctx.moveTo(x,y);ctx.lineTo(x+os,y);ctx.quadraticCurveTo(x+os,y+os,x,y+os);ctx.closePath();
    // inner hole reverse
    rrReverse(ctx,x+bw,y+bw,ins,ins,ins*0.5);
  }else if(S.eyeShape==='thick'){
    ctx.rect(x,y,os,os);
    // inner hole (smaller)
    ctx.rect(x+bw*1.8,y+bw*1.8,os-bw*3.6,os-bw*3.6);
  }else{
    // square
    ctx.rect(x,y,os,os);
    ctx.rect(x+bw,y+bw,ins,ins);
  }
  ctx.fill('evenodd');

  if(!isOffscreen){
    // In normal mode, also refill bg inside hole so it looks correct on non-transparent bg
    ctx.fillStyle=S.bgColor;
    if(S.eyeShape==='circle'){ctx.beginPath();ctx.arc(cx,cy,os/2-bw,0,Math.PI*2);ctx.fill();}
    else if(S.eyeShape==='rounded'){ctx.beginPath();rr(ctx,x+bw,y+bw,ins,ins,ins*0.18);ctx.fill();}
    else if(S.eyeShape==='leaf'){ctx.beginPath();rr(ctx,x+bw,y+bw,ins,ins,ins*0.5);ctx.fill();}
    else if(S.eyeShape==='thick'){ctx.fillRect(x+bw*1.8,y+bw*1.8,os-bw*3.6,os-bw*3.6);}
    else{ctx.fillRect(x+bw,y+bw,ins,ins);}
  }

  // --- Draw eyeball ---
  ctx.fillStyle=ec;
  var bs=ms*3,bx=cx-bs/2,by=cy-bs/2;
  if(S.eyeballShape==='circle'){ctx.beginPath();ctx.arc(cx,cy,bs/2,0,Math.PI*2);ctx.fill();}
  else if(S.eyeballShape==='rounded'){ctx.beginPath();rr(ctx,bx,by,bs,bs,bs*0.32);ctx.fill();}
  else if(S.eyeballShape==='diamond'){ctx.beginPath();ctx.moveTo(cx,by);ctx.lineTo(bx+bs,cy);ctx.lineTo(cx,by+bs);ctx.lineTo(bx,cy);ctx.closePath();ctx.fill();}
  else if(S.eyeballShape==='cross'){var t=bs*0.28;ctx.fillRect(bx+t,by,bs-2*t,bs);ctx.fillRect(bx,by+t,bs,bs-2*t);}
  else{ctx.fillRect(bx,by,bs,bs);}
}

// Reverse-winding rounded rect (for evenodd hole punching)
function rrReverse(ctx,x,y,w,h,r){
  ctx.moveTo(x+r,y);
  ctx.quadraticCurveTo(x,y,x,y+r);
  ctx.lineTo(x,y+h-r);ctx.quadraticCurveTo(x,y+h,x+r,y+h);
  ctx.lineTo(x+w-r,y+h);ctx.quadraticCurveTo(x+w,y+h,x+w,y+h-r);
  ctx.lineTo(x+w,y+r);ctx.quadraticCurveTo(x+w,y,x+w-r,y);
  ctx.closePath();
}

// ===== CORE QR DRAW (reusable at any resolution) =====
function _drawQRToCanvas(canvas, sz, text){
    var qr=QRCodeEngine.create(text,S.ecc);
    var mc=qr.getModuleCount();
    var mg=S.margin, ms=sz/(mc+mg*2), off=mg*ms;
    canvas.width=sz; canvas.height=sz;
    var ctx=canvas.getContext('2d');
    ctx.imageSmoothingEnabled=true; ctx.imageSmoothingQuality='high';

    ctx.fillStyle=S.bgColor; ctx.fillRect(0,0,sz,sz);

    var eyes=[{r:3,c:3},{r:3,c:mc-4},{r:mc-4,c:3}];
    var eyeSet={};
    eyes.forEach(function(e){for(var dr=-3;dr<=3;dr++)for(var dc=-3;dc<=3;dc++)eyeSet[(e.r+dr)+','+(e.c+dc)]=1;});

    var logoZone=null, logoDrawInfo=null;
    if(S.logoImg){
      var maxPx=sz*(S.logoSize/100);
      var asp=S.logoImg.naturalWidth/S.logoImg.naturalHeight;
      var lw,lh;
      if(asp>=1){lw=maxPx;lh=maxPx/asp;}else{lh=maxPx;lw=maxPx*asp;}
      var lx=(sz-lw)/2, ly=(sz-lh)/2;
      var pad=S.logoMargin*(sz/S.size);
      var clearX=lx-pad,clearY=ly-pad,clearW=lw+pad*2,clearH=lh+pad*2;
      var clearR=Math.max(clearW,clearH)/2;
      logoZone={sx:clearX-ms/2,sy:clearY-ms/2,sw:clearW+ms,sh:clearH+ms,
                scx:sz/2,scy:sz/2,sr:clearR+ms/2,x:clearX,y:clearY,w:clearW,h:clearH,r:clearR};
      logoDrawInfo={lx:lx,ly:ly,lw:lw,lh:lh,clearX:clearX,clearY:clearY,clearW:clearW,clearH:clearH,clearR:clearR};
    }

    function inLogoZone(mx,my){
      if(!logoZone)return false;
      var cx2=mx+ms/2,cy2=my+ms/2;
      if(S.logoBg==='circle'){var dx=cx2-logoZone.scx,dy=cy2-logoZone.scy;return Math.sqrt(dx*dx+dy*dy)<logoZone.sr;}
      return cx2>logoZone.sx&&cx2<logoZone.sx+logoZone.sw&&cy2>logoZone.sy&&cy2<logoZone.sy+logoZone.sh;
    }

    var useGrad=S.gradType!=='none', eyeHasCustomColor=S.useEyeColor;

    if(useGrad&&!eyeHasCustomColor){
      var offC=document.createElement('canvas'); offC.width=sz; offC.height=sz;
      var ctx2=offC.getContext('2d');
      for(var r=0;r<mc;r++)for(var c=0;c<mc;c++){
        if(eyeSet[r+','+c])continue; if(!qr.isDark(r,c))continue;
        var mx=off+c*ms,my=off+r*ms; if(inLogoZone(mx,my))continue;
        drawModule(ctx2,mx,my,ms,S.bodyShape,'#000000');
      }
      eyes.forEach(function(e){drawEyeAt(ctx2,off+(e.c+0.5)*ms,off+(e.r+0.5)*ms,ms,'#000000');});
      var gradCanvas=document.createElement('canvas'); gradCanvas.width=sz; gradCanvas.height=sz;
      var gctx=gradCanvas.getContext('2d'); var grad;
      if(S.gradType==='radial'){grad=gctx.createRadialGradient(sz/2,sz/2,0,sz/2,sz/2,sz*0.65);}
      else if(S.gradType==='diagonal'){grad=gctx.createLinearGradient(0,sz,sz,0);}
      else{grad=gctx.createLinearGradient(0,0,sz,sz);}
      grad.addColorStop(0,S.gradColor1); grad.addColorStop(1,S.gradColor2);
      gctx.fillStyle=grad; gctx.fillRect(0,0,sz,sz);
      gctx.globalCompositeOperation='destination-in'; gctx.drawImage(offC,0,0);
      ctx.fillStyle=S.bgColor; ctx.fillRect(0,0,sz,sz);
      ctx.drawImage(gradCanvas,0,0,sz,sz,0,0,sz,sz);
    }else{
      var gradFill=S.fgColor;
      if(useGrad){
        var grad2;
        if(S.gradType==='radial'){grad2=ctx.createRadialGradient(sz/2,sz/2,0,sz/2,sz/2,sz*0.65);}
        else if(S.gradType==='diagonal'){grad2=ctx.createLinearGradient(0,sz,sz,0);}
        else{grad2=ctx.createLinearGradient(0,0,sz,sz);}
        grad2.addColorStop(0,S.gradColor1); grad2.addColorStop(1,S.gradColor2);
        gradFill=grad2;
      }
      for(var r=0;r<mc;r++)for(var c=0;c<mc;c++){
        if(eyeSet[r+','+c])continue; if(!qr.isDark(r,c))continue;
        var mx=off+c*ms,my=off+r*ms; if(inLogoZone(mx,my))continue;
        drawModule(ctx,mx,my,ms,S.bodyShape,gradFill);
      }
      eyes.forEach(function(e){drawEyeAt(ctx,off+(e.c+0.5)*ms,off+(e.r+0.5)*ms,ms,null);});
    }

    if(logoDrawInfo){
      var ld=logoDrawInfo;
      ctx.fillStyle=S.bgColor;
      if(S.logoBg==='circle'){ctx.beginPath();ctx.arc(sz/2,sz/2,ld.clearR,0,Math.PI*2);ctx.fill();}
      else if(S.logoBg==='rounded'){ctx.beginPath();rr(ctx,ld.clearX,ld.clearY,ld.clearW,ld.clearH,ld.clearH*0.28);ctx.fill();}
      else{ctx.fillRect(ld.clearX,ld.clearY,ld.clearW,ld.clearH);}
      ctx.imageSmoothingEnabled=true; ctx.imageSmoothingQuality='high';
      ctx.drawImage(S.logoImg,ld.lx,ld.ly,ld.lw,ld.lh);
    }
}

// ===== RENDER =====
var _rt;
function render(){clearTimeout(_rt);_rt=setTimeout(_render,60);}

function _render(){
  var text=buildData();
  if(!text||text.trim().length<2){
    document.getElementById('qrCanvas').style.display='none';
    document.getElementById('noQr').style.display='';
    document.getElementById('noQr').innerHTML='<div>กรอกข้อมูลเพื่อสร้าง QR Code</div>';
    return;
  }
  try{
    var qr=QRCodeEngine.create(text,S.ecc);
    var mc=qr.getModuleCount();
    var dpr=window.devicePixelRatio||1;
    var sz=S.size,mg=S.margin,ms=sz/(mc+mg*2),off=mg*ms;
    var canvas=document.getElementById('qrCanvas');

    // Draw at screen resolution via HiDPI scale trick
    canvas.width=sz*dpr; canvas.height=sz*dpr;
    var isMobile=window.innerWidth<=860;
    if(isMobile){
      var wrap=canvas.parentElement; // .qr-wrap
      // Force read layout dimensions after browser has painted
      var wrapW=wrap.offsetWidth||window.innerWidth;
      var wrapH=wrap.offsetHeight;
      // If offsetHeight is 0 (not painted yet), estimate from window
      if(wrapH<10){
        var dlBar=44;
        wrapH=Math.min(Math.round(window.innerHeight*0.30),260)-dlBar;
      }
      var fit=Math.min(wrapW,wrapH)-16;
      if(fit<60)fit=wrapW-16;
      canvas.style.width=fit+'px';
      canvas.style.height=fit+'px';
    }else{
      canvas.style.width=sz+'px';
      canvas.style.height=sz+'px';
    }
    var ctx=canvas.getContext('2d');
    ctx.scale(dpr,dpr);
    ctx.imageSmoothingEnabled=true; ctx.imageSmoothingQuality='high';

    // Reuse core draw on a temporary canvas then stamp onto dpr-scaled main canvas
    var tmp=document.createElement('canvas');
    _drawQRToCanvas(tmp, sz, text);
    ctx.drawImage(tmp,0,0,sz,sz,0,0,sz,sz);

    canvas.style.display='';
    document.getElementById('noQr').style.display='none';
    window._qrText=text;
  }catch(err){
    console.error('QR Error:',err);
    document.getElementById('noQr').style.display='';
    document.getElementById('noQr').innerHTML='<div class="no-qr-icon">⚠️</div><div style="color:#e94560;font-size:11px">เกิดข้อผิดพลาด: '+err.message+'</div>';
    document.getElementById('qrCanvas').style.display='none';
  }
}

// ===== EXPORT SIZE SELECTOR (unified: desktop + mobile presets sync) =====
var _exportPx = 1024;

function setExportPx(val, sourceGroup){
  // sync both preset groups
  document.querySelectorAll('.size-preset').forEach(function(b){ b.classList.remove('active'); });
  document.querySelectorAll('.size-preset[data-px="'+val+'"]').forEach(function(b){ b.classList.add('active'); });
  var isCustom = (val === 'custom');
  ['exportCustomRow','exportCustomRowM'].forEach(function(id){
    var el=document.getElementById(id);
    if(el) el.style.display = isCustom ? 'flex' : 'none';
  });
  if(!isCustom){
    _exportPx = parseInt(val);
  } else {
    var cv = parseInt((document.getElementById('exportCustomPxM')||{}).value || document.getElementById('exportCustomPx').value) || 1500;
    _exportPx = Math.min(8192, Math.max(64, cv));
  }
}

['exportPresets','exportPresetsMobile'].forEach(function(id){
  var el=document.getElementById(id);
  if(!el) return;
  el.addEventListener('click', function(e){
    var btn=e.target.closest('.size-preset');
    if(!btn) return;
    setExportPx(btn.dataset.px, id);
  });
});

['exportCustomPx','exportCustomPxM'].forEach(function(id){
  var el=document.getElementById(id);
  if(!el) return;
  el.addEventListener('input', function(){
    _exportPx = Math.min(8192, Math.max(64, parseInt(this.value)||64));
  });
});

    var exportCanvas=document.createElement('canvas');
    _drawQRToCanvas(exportCanvas, _exportPx, window._qrText);

}
function doDownloadSvg(){
  if(!window._qrText){toast('กรุณาสร้าง QR ก่อน');return;}
  try{
    var qr=QRCodeEngine.create(window._qrText,S.ecc);
    var mc=qr.getModuleCount(),sz=S.size,mg=S.margin,ms=sz/(mc+mg*2),off=mg*ms;
    var svg='<svg xmlns="http://www.w3.org/2000/svg" width="'+sz+'" height="'+sz+'" viewBox="0 0 '+sz+' '+sz+'"><rect width="'+sz+'" height="'+sz+'" fill="'+S.bgColor+'"/>';
    var eyes=[{r:3,c:3},{r:3,c:mc-4},{r:mc-4,c:3}];
    var eyeSet={};
    eyes.forEach(function(e){for(var dr=-3;dr<=3;dr++)for(var dc=-3;dc<=3;dc++)eyeSet[(e.r+dr)+','+(e.c+dc)]=1;});
    for(var r=0;r<mc;r++)for(var c=0;c<mc;c++){
      if(eyeSet[r+','+c]||!qr.isDark(r,c))continue;
      var x=off+c*ms,y=off+r*ms,s=ms;
      if(S.bodyShape==='circle'||S.bodyShape==='dot'){svg+='<circle cx="'+(x+s/2)+'" cy="'+(y+s/2)+'" r="'+(s*0.46)+'" fill="'+S.fgColor+'"/>';}
      else if(S.bodyShape==='rounded'){svg+='<rect x="'+x+'" y="'+y+'" width="'+s+'" height="'+s+'" rx="'+(s*0.32)+'" fill="'+S.fgColor+'"/>';}
      else if(S.bodyShape==='diamond'){svg+='<polygon points="'+(x+s/2)+','+y+' '+(x+s)+','+(y+s/2)+' '+(x+s/2)+','+(y+s)+' '+x+','+(y+s/2)+'" fill="'+S.fgColor+'"/>';}
      else{svg+='<rect x="'+x+'" y="'+y+'" width="'+s+'" height="'+s+'" fill="'+S.fgColor+'"/>';}
    }
    var ec=S.useEyeColor?S.eyeColor:S.fgColor;
    eyes.forEach(function(e){
      var cx=off+e.c*ms,cy=off+e.r*ms,os=ms*7,ins=ms*5,bw=ms,ex=cx-os/2,ey=cy-os/2;
      if(S.eyeShape==='circle'){svg+='<circle cx="'+cx+'" cy="'+cy+'" r="'+(os/2)+'" fill="'+ec+'"/><circle cx="'+cx+'" cy="'+cy+'" r="'+(os/2-bw)+'" fill="'+S.bgColor+'"/>';}
      else if(S.eyeShape==='rounded'){svg+='<rect x="'+ex+'" y="'+ey+'" width="'+os+'" height="'+os+'" rx="'+(os*0.22)+'" fill="'+ec+'"/><rect x="'+(ex+bw)+'" y="'+(ey+bw)+'" width="'+ins+'" height="'+ins+'" rx="'+(ins*0.18)+'" fill="'+S.bgColor+'"/>';}
      else{svg+='<rect x="'+ex+'" y="'+ey+'" width="'+os+'" height="'+os+'" fill="'+ec+'"/><rect x="'+(ex+bw)+'" y="'+(ey+bw)+'" width="'+ins+'" height="'+ins+'" fill="'+S.bgColor+'"/>';}
      var bs=ms*3,bx=cx-bs/2,by=cy-bs/2;
      if(S.eyeballShape==='circle'){svg+='<circle cx="'+cx+'" cy="'+cy+'" r="'+(bs/2)+'" fill="'+ec+'"/>';}
      else if(S.eyeballShape==='rounded'){svg+='<rect x="'+bx+'" y="'+by+'" width="'+bs+'" height="'+bs+'" rx="'+(bs*0.3)+'" fill="'+ec+'"/>';}
      else if(S.eyeballShape==='diamond'){svg+='<polygon points="'+cx+','+by+' '+(bx+bs)+','+cy+' '+cx+','+(by+bs)+' '+bx+','+cy+'" fill="'+ec+'"/>';}
      else{svg+='<rect x="'+bx+'" y="'+by+'" width="'+bs+'" height="'+bs+'" fill="'+ec+'"/>';}
    });
    svg+='</svg>';
    var blob=new Blob([svg],{type:'image/svg+xml'});
    var a=document.createElement('a');a.download='qrcode.svg';a.href=URL.createObjectURL(blob);a.click();URL.revokeObjectURL(a.href);
    toast('ดาวน์โหลด SVG แล้ว ✓');
  }catch(e){console.error(e);toast('เกิดข้อผิดพลาด');}
}

// ===== SCAN CHECKER =====
// ===== SCAN VERIFY SYSTEM =====
// Uses BarcodeDetector (native browser API, works offline)
// Fallback: jsQR via CDN if BarcodeDetector unavailable

var _jsQRLoaded=false,_jsQRLoading=false;
var _barcodeDetector=null;

// Init BarcodeDetector if available
if('BarcodeDetector' in window){
  try{
    _barcodeDetector=new BarcodeDetector({formats:['qr_code']});
  }catch(e){_barcodeDetector=null;}
}

function setScanState(state,msg,decoded){
  var colors={ok:'#6af7a0',fail:'#e94560',warn:'#f5a623',idle:'var(--text3)',checking:'#7c6af7'};
  var textColor=state==='ok'?'#6af7a0':state==='fail'?'#e94560':state==='warn'?'#f5a623':'var(--text2)';
  var shadow=state==='ok'?'0 0 8px #6af7a080':state==='fail'?'0 0 8px #e9456080':'none';
  var anim=state==='checking'?'pulse 0.8s infinite':'none';

  // Apply to both desktop and mobile scan elements
  [['scanDot','scanMsg','scanResult'],['scanDotM','scanMsgM','scanResultM']].forEach(function(ids){
    var dot=document.getElementById(ids[0]);
    var msgEl=document.getElementById(ids[1]);
    var res=document.getElementById(ids[2]);
    if(!dot||!msgEl) return;
    dot.style.background=colors[state]||colors.idle;
    dot.style.boxShadow=shadow;
    dot.style.animation=anim;
    msgEl.style.color=textColor;
    msgEl.textContent=msg;
    if(res){
      if(decoded!==undefined&&decoded!==null){
        res.style.display='';
        res.textContent='📋 '+decoded;
        res.style.borderLeft='3px solid '+(state==='ok'?'#6af7a0':'#e94560');
      }else{
        res.style.display='none';
      }
    }
  });
}

function getCanvasImageBlob(cb){
  var canvas=document.getElementById('qrCanvas');
  if(!canvas||canvas.style.display==='none'){cb(null,null);return;}
  var sz=S.size;
  var tmp=document.createElement('canvas');
  tmp.width=sz;tmp.height=sz;
  var tctx=tmp.getContext('2d');
  tctx.drawImage(canvas,0,0,canvas.width,canvas.height,0,0,sz,sz);
  cb(tmp,tctx.getImageData(0,0,sz,sz));
}

function tryScanWithBarcodeDetector(cb){
  if(!_barcodeDetector){cb(null);return;}
  getCanvasImageBlob(function(tmpCanvas,imgData){
    if(!tmpCanvas){cb(null);return;}
    _barcodeDetector.detect(tmpCanvas).then(function(results){
      if(results&&results.length>0) cb(results[0].rawValue);
      else cb(null);
    }).catch(function(){cb(null);});
  });
}

function tryScanWithJsQR(cb){
  getCanvasImageBlob(function(tmpCanvas,imgData){
    if(!tmpCanvas){cb(null);return;}
    if(typeof jsQR==='undefined'){cb(null);return;}
    var r=jsQR(imgData.data,imgData.width,imgData.height,{inversionAttempts:'dontInvert'});
    if(!r) r=jsQR(imgData.data,imgData.width,imgData.height,{inversionAttempts:'attemptBoth'});
    cb(r?r.data:null);
  });
}

function loadJsQR(cb){
  if(_jsQRLoaded){cb();return;}
  if(_jsQRLoading){setTimeout(function(){loadJsQR(cb);},300);return;}
  _jsQRLoading=true;
  var s=document.createElement('script');
  s.src='https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js';
  s.onload=function(){_jsQRLoaded=true;cb();};
  s.onerror=function(){_jsQRLoading=false;cb();};
  document.head.appendChild(s);
}

function runScanCheck(){
  var canvas=document.getElementById('qrCanvas');
  if(!canvas||canvas.style.display==='none'){
    setScanState('idle','รอสร้าง QR...');return;
  }
  setScanState('checking','กำลังตรวจสอบ...');

  // Try BarcodeDetector first (native, offline)
  tryScanWithBarcodeDetector(function(result){
    if(result!==null){
      setScanState('ok','✓ แสกนได้ (Native API)',result);
      return;
    }
    // Fallback to jsQR (needs CDN first time)
    loadJsQR(function(){
      tryScanWithJsQR(function(result2){
        if(result2!==null){
          setScanState('ok','✓ แสกนได้',result2);
        }else if(!_barcodeDetector && !_jsQRLoaded){
          setScanState('warn','⚠ ต้องการอินเทอร์เน็ตครั้งแรกเพื่อโหลด jsQR','BarcodeDetector ไม่พร้อมใช้งานในเบราว์เซอร์นี้');
        }else{
          setScanState('fail','✗ แสกนไม่ได้','ลองเพิ่มความหนาแน่น, ลดขนาดโลโก้, เปลี่ยน Shape หรือใช้สีที่ต่างจากพื้นหลัง');
        }
      });
    });
  });
}

var styleEl=document.createElement('style');
styleEl.textContent='@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(0.7)}}';
document.head.appendChild(styleEl);

// Auto-check 800ms after each render
var _scanTimer;
var _origRender=_render;
_render=function(){
  _origRender();
  clearTimeout(_scanTimer);
  _scanTimer=setTimeout(runScanCheck,800);
};

function setHeaderH(){
  var h=document.querySelector('.header');
  if(h) document.documentElement.style.setProperty('--header-h', h.offsetHeight+'px');
}
setHeaderH();
window.addEventListener('resize', function(){ setHeaderH(); render(); });
render();
